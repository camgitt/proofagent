<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">

  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1021"/>
      <stop offset="100%" stop-color="#1a1d3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid dots for texture -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Checkmark icon — larger -->
  <rect x="164" y="208" width="88" height="88" rx="16" fill="#6366f1" opacity="0.15"/>
  <rect x="164" y="208" width="88" height="88" rx="16" fill="none" stroke="#6366f1" stroke-width="2"/>
  <path d="M188 256 L202 270 L232 240" stroke="#818cf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Product name — big and bold -->
  <text x="274" y="278" font-family="'SF Pro Display', 'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="72" font-weight="800" fill="#f0f0ff" letter-spacing="-2">proofagent</text>

  <!-- Tagline -->
  <text x="168" y="348" font-family="'SF Pro Display', 'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="36" font-weight="500" fill="#a5b4fc">pytest for AI agents</text>

  <!-- Feature pills -->
  <rect x="168" y="388" width="180" height="36" rx="18" fill="#6366f1" opacity="0.12"/>
  <text x="258" y="412" font-family="'SF Mono', 'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#a5b4fc" text-anchor="middle">20 assertions</text>

  <rect x="364" y="388" width="160" height="36" rx="18" fill="#6366f1" opacity="0.12"/>
  <text x="444" y="412" font-family="'SF Mono', 'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#a5b4fc" text-anchor="middle">8 providers</text>

  <rect x="540" y="388" width="170" height="36" rx="18" fill="#6366f1" opacity="0.12"/>
  <text x="625" y="412" font-family="'SF Mono', 'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#a5b4fc" text-anchor="middle">0 telemetry</text>

  <rect x="726" y="388" width="140" height="36" rx="18" fill="#6366f1" opacity="0.12"/>
  <text x="796" y="412" font-family="'SF Mono', 'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#a5b4fc" text-anchor="middle">pure Python</text>

  <!-- Install command -->
  <rect x="168" y="458" width="380" height="44" rx="8" fill="#ffffff" opacity="0.05"/>
  <text x="188" y="486" font-family="'SF Mono', 'IBM Plex Mono', monospace" font-size="18" fill="#4ade80">$</text>
  <text x="210" y="486" font-family="'SF Mono', 'IBM Plex Mono', monospace" font-size="18" fill="#c4b5fd">pip install proofagent</text>

  <!-- URL bottom-left -->
  <text x="60" y="600" font-family="'SF Mono', 'IBM Plex Mono', monospace" font-size="16" fill="#4a4a6a">proofagent.dev</text>

  <!-- Open source badge bottom-right -->
  <rect x="1100" y="582" width="120" height="28" rx="14" fill="#6366f1" opacity="0.12"/>
  <text x="1160" y="601" font-family="'SF Mono', 'IBM Plex Mono', monospace" font-size="13" fill="#818cf8" text-anchor="middle">MIT License</text>

</svg>
